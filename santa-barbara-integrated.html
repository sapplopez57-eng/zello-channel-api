<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTA BÁRBARA | ARES CORE C2 INTEGRATED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #020202;
            --panel-bg: rgba(5, 15, 5, 0.92);
            --primary: #3dff3d;
            --primary-dim: rgba(61, 255, 61, 0.1);
            --accent: #8b5cf6;
            --alert: #ff3d3d;
            --font-mono: 'Courier New', Courier, monospace;
        }
        body { margin: 0; overflow: hidden; background-color: var(--bg); font-family: var(--font-mono); color: var(--primary); }
        
        /* UI LAYER */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: grid; grid-template-rows: auto 1fr auto; }
        
        .panel { 
            pointer-events: auto; 
            background: var(--panel-bg); 
            border: 1px solid var(--primary); 
            color: var(--primary); 
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(61, 255, 61, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanline 3s linear infinite;
        }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }

        .panel-collapsed { height: 40px !important; width: 200px !important; overflow: hidden; }
        .panel-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 12px; border-bottom: 1px solid rgba(61, 255, 61, 0.3);
            cursor: move; user-select: none;
        }
        .panel-title { font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        
        /* CONTROLS */
        .btn-fire { 
            background: linear-gradient(135deg, #ff3d3d, #991b1b); 
            color: white; border: 1px solid #ff3d3d; 
            padding: 12px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px; 
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
        }
        .btn-fire:hover { background: #ff0000; box-shadow: 0 0 25px #ff0000; transform: scale(1.02); }
        .btn-fire:active { transform: scale(0.98); }
        
        .btn-ai { 
            background: linear-gradient(135deg, #4a1d96, #2e1065); 
            color: #d8b4fe; border: 1px solid #6d28d9; 
            padding: 6px 12px; font-size: 10px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-ai:hover { background: #6d28d9; box-shadow: 0 0 15px #6d28d9; color: white; }

        .toggle-btn { cursor: pointer; border: 1px solid var(--primary); padding: 2px 8px; font-size: 9px; opacity: 0.7; }
        .toggle-btn:hover { opacity: 1; background: var(--primary-dim); }

        /* INPUTS */
        select, input, textarea { 
            background: rgba(0,0,0,0.6); color: var(--primary); 
            border: 1px solid rgba(61, 255, 61, 0.4); 
            font-family: var(--font-mono); font-size: 11px; 
            width: 100%; padding: 6px; outline: none;
        }
        select:focus, input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--primary-dim); }
        option { background: #000; }

        /* TABLES & LISTS */
        .table-container { max-height: 150px; overflow-y: auto; font-size: 9px; border-top: 1px solid rgba(61, 255, 61, 0.2); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(61, 255, 61, 0.1); position: sticky; top: 0; }
        th, td { border: 1px solid rgba(61, 255, 61, 0.2); padding: 4px 6px; text-align: center; }
        tr:hover { background: rgba(61, 255, 61, 0.05); }

        /* CONSOLE */
        #ai-console { 
            max-height: 200px; overflow-y: auto; font-size: 10px; 
            background: rgba(10, 5, 20, 0.9); border: 1px solid #6d28d9; 
            color: #d8b4fe; padding: 8px; margin-top: 10px; 
            line-height: 1.5; font-family: 'Consolas', monospace;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid transparent; padding-left: 6px; }
        .log-info { border-color: #3b82f6; color: #93c5fd; }
        .log-warn { border-color: #f59e0b; color: #fcd34d; }
        .log-error { border-color: #ef4444; color: #fca5a5; }
        .log-success { border-color: #10b981; color: #6ee7b7; }

        /* NETWORK STATUS */
        .node-status { display: flex; align-items: center; gap: 8px; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; box-shadow: 0 0 5px currentColor; }
        .status-online { background: #10b981; color: #10b981; }
        .status-offline { background: #ef4444; color: #ef4444; }
        .status-sync { background: #f59e0b; color: #f59e0b; animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(61, 255, 61, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(61, 255, 61, 0.6); }

        /* LOADING */
        .loading-dots:after { content: '...'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }

        /* ALERTS */
        .alert-banner {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5;
            padding: 10px 24px; border-radius: 4px; font-size: 12px; font-weight: bold;
            display: none; z-index: 100; backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- HEADER -->
    <div class="panel m-4 rounded flex justify-between items-center px-4 py-2" style="height: auto;">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-widest text-shadow-glow">SANTA BÁRBARA <span class="text-xs font-normal opacity-70">| ARES CORE C2</span></h1>
            <div class="flex items-center gap-2 text-xs">
                <span class="status-dot status-online"></span>
                <span id="network-status">RED TÁCTICA ACTIVA</span>
            </div>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
            <span id="clock">00:00:00 Z</span>
            <span class="opacity-50">|</span>
            <span id="fps-counter">60 FPS</span>
        </div>
    </div>

    <!-- MAIN CONTENT GRID -->
    <div class="flex gap-4 p-4 h-full overflow-hidden">
        
        <!-- LEFT PANEL: FIRE CONTROL -->
        <div id="panel-left" class="panel w-80 rounded flex flex-col">
            <div class="panel-header">
                <span class="panel-title">🎯 Control de Fuego</span>
                <span class="toggle-btn" onclick="togglePanel('panel-left')">◫</span>
            </div>
            <div class="p-4 space-y-4 flex-1 overflow-y-auto">
                <div>
                    <label class="text-xs opacity-70 block mb-1">PLATAFORMA</label>
                    <select id="calibre-select" onchange="initAmmoConfig()">
                        <option value="155">OBÚS 155mm (M198/M107)</option>
                        <option value="105">OBÚS 105mm (M102)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs opacity-70 block mb-1">PROYECTIL</label>
                    <select id="ammo-select" onchange="initChargeConfig()"></select>
                </div>
                <div>
                    <label class="text-xs opacity-70 block mb-1">CARGA PROPULSORA</label>
                    <select id="charge-select" onchange="updateBallistics()"></select>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs opacity-70 block mb-1">ELEVACIÓN (°)</label>
                        <input type="number" id="angle-num" value="45" step="0.1" onchange="syncSlider(this.value)">
                    </div>
                    <div>
                        <label class="text-xs opacity-70 block mb-1">V0 (m/s)</label>
                        <div id="v0-display" class="bg-black border border-green-900 p-2 text-center text-sm font-bold">--</div>
                    </div>
                </div>
                <input type="range" id="angle-input" min="5" max="85" value="45" class="w-full accent-green-500 h-2 bg-gray-900 rounded-lg appearance-none cursor-pointer" oninput="syncNum(this.value)">

                <div class="border-t border-purple-900 pt-4 space-y-3">
                    <div>
                        <label class="text-xs text-purple-400 block mb-1">🤖 COMANDO DE VOZ / TEXTO</label>
                        <textarea id="ai-input" placeholder="Ej: Búnker enemigo a 18km, coordenadas NK4567..." class="h-16 resize-none"></textarea>
                        <div class="flex gap-2 mt-2">
                            <button class="btn-ai flex-1" onclick="askGeminiStrategy()">CALCULAR SOLUCIÓN</button>
                            <button class="btn-ai" onclick="analyzeWeather()">METEO</button>
                        </div>
                    </div>
                    
                    <button class="btn-fire w-full text-sm" onclick="fireProjectile()">⚠️ EJECUTAR DISPARO</button>
                </div>

                <div id="ai-console" class="hidden"></div>
            </div>
        </div>

        <!-- CENTER: 3D VIEWPORT (Transparent) -->
        <div class="flex-1 relative">
            <!-- Overlay Info -->
            <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/50 backdrop-blur px-4 py-2 rounded border border-green-900 text-xs font-mono pointer-events-none">
                VISTA TÁCTICA 3D | ESCALA 1:5000
            </div>
            
            <!-- Camera Controls -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 pointer-events-auto">
                <button onclick="setCameraMode('fixed')" class="btn-ai px-4 py-2">VISTA FIJA</button>
                <button onclick="setCameraMode('follow')" class="btn-ai px-4 py-2">SEGUIMIENTO</button>
                <button onclick="setCameraMode('god')" class="btn-ai px-4 py-2">OJO DE DIOS</button>
            </div>
        </div>

        <!-- RIGHT PANEL: TELEMETRY & NETWORK -->
        <div id="panel-right" class="panel w-80 rounded flex flex-col">
            <div class="panel-header">
                <span class="panel-title">📡 Telemetría & Red</span>
                <span class="toggle-btn" onclick="togglePanel('panel-right')">◫</span>
            </div>
            <div class="p-4 space-y-4 flex-1 overflow-y-auto">
                
                <!-- Network Nodes -->
                <div>
                    <label class="text-xs opacity-70 block mb-2">NODOS CONECTADOS (ANDROID/KOTLIN)</label>
                    <div id="network-nodes" class="space-y-1">
                        <!-- Nodes injected via JS -->
                    </div>
                </div>

                <!-- Real-time Stats -->
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-black/50 p-2 border border-green-900 rounded">
                        <div class="text-xs opacity-50">ALCANCE (X)</div>
                        <div id="val-x" class="text-lg font-bold">0 m</div>
                    </div>
                    <div class="bg-black/50 p-2 border border-green-900 rounded">
                        <div class="text-xs opacity-50">ALTITUD (Y)</div>
                        <div id="val-y" class="text-lg font-bold">0 m</div>
                    </div>
                    <div class="bg-black/50 p-2 border border-green-900 rounded">
                        <div class="text-xs opacity-50">VELOCIDAD</div>
                        <div id="val-v" class="text-sm">0 m/s</div>
                    </div>
                    <div class="bg-black/50 p-2 border border-green-900 rounded">
                        <div class="text-xs opacity-50">ACTITUD</div>
                        <div id="val-att" class="text-xs">0° / 0°</div>
                    </div>
                </div>

                <button class="btn-ai w-full" onclick="optimizeTrajectory()">✨ OPTIMIZAR TRAYECTORIA (IA)</button>

                <!-- Data Table -->
                <div class="flex-1 flex flex-col min-h-0">
                    <label class="text-xs opacity-70 block mb-1">REGISTRO DE VUELO</label>
                    <div class="table-container flex-1 border border-green-900 rounded">
                        <table id="fire-table">
                            <thead><tr><th>T(s)</th><th>X(m)</th><th>Y(m)</th><th>V(m/s)</th></tr></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Weather -->
                <div id="weather-display" class="hidden bg-blue-900/20 border border-blue-800 p-2 rounded text-xs">
                    <div class="font-bold text-blue-400 mb-1">CONDICIONES ATMOSFÉRICAS</div>
                    <div id="weather-text" class="font-mono"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="alert-banner" id="alertBanner">⚠️ INTERFERENCIA ELECTROMAGNÉTICA DETECTADA</div>

<script>
    // --- CONFIGURATION & STATE ---
    const API_KEY = ""; // Insertar clave Gemini si se desea funcionalidad real de IA
    const STATE = {
        isFlying: false,
        cameraMode: 'fixed',
        windVector: { x: 0, z: 0 },
        activeAmmo: null,
        currentV0: 0,
        maxAltitude: 0,
        nodes: [
            { id: 'android-01', name: 'FO Team Alpha', type: 'Observador', status: 'online' },
            { id: 'android-02', name: 'Mechanic Unit 4', type: 'Mantenimiento', status: 'online' },
            { id: 'android-03', name: 'Commander Tablet', type: 'Comando', status: 'offline' }
        ]
    };

    const WEAPONS_DATA = {
        "155": {
            ammo: [
                { id: "HE_M106", name: "155mm HE M106", mass: 43.2, hera: false },
                { id: "HERA_M549A1", name: "155mm HERA M549A1", mass: 43.5, hera: true },
                { id: "RAAM_M718", name: "155mm RAAM LM718A1", mass: 46.7, hera: false },
                { id: "ILLUM_M485", name: "155mm ILLUM M485", mass: 41.7, hera: false }
            ],
            charges: [
                { name: "GB M3A1 (6km)", v0: 375 },
                { name: "WB M4A2 (18km)", v0: 565 },
                { name: "WB M119A2 (30km)", v0: 790 },
                { name: "RB M203 (30km+)", v0: 827 }
            ]
        },
        "105": {
            ammo: [
                { id: "HE_M1", name: "105mm HE M1", mass: 14.9, hera: false },
                { id: "ILLUM_M314", name: "105mm ILLUM M314/A3", mass: 14.5, hera: false },
                { id: "SMOKE_HC", name: "105mm SMOKE HC", mass: 15.1, hera: false }
            ],
            charges: Array.from({length: 7}, (_, i) => ({ name: `Carga ${i+1}`, v0: 200 + (i * 50) }))
        }
    };

    // --- THREE.JS VARIABLES ---
    let scene, camera, renderer, controls, clock;
    let cannon, projectile, trail;
    let stateVec = new Float64Array(12); // Physics state vector
    let pathPoints = [];

    // --- INITIALIZATION ---
    function init() {
        // Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020305);
        scene.fog = new THREE.FogExp2(0x020305, 0.00004);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
        camera.position.set(50, 30, 50);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        clock = new THREE.Clock();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);

        // World Grid
        const gridHelper = new THREE.GridHelper(400000, 100, 0x1a331a, 0x051505);
        scene.add(gridHelper);

        // Cannon Model
        cannon = new THREE.Group();
        const barrelGeo = new THREE.CylinderGeometry(0.5, 0.8, 10, 16);
        const barrelMat = new THREE.MeshPhongMaterial({ color: 0x2d3d2d });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.z = 5;
        cannon.add(barrel);
        scene.add(cannon);

        // Projectile Model
        const projGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8, 8);
        const projMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0x331100 });
        projectile = new THREE.Mesh(projGeo, projMat);
        projectile.visible = false;
        scene.add(projectile);

        // Trail Line
        const lineGeo = new THREE.BufferGeometry();
        const lineMat = new THREE.LineBasicMaterial({ color: 0x3dff3d, transparent: true, opacity: 0.6 });
        trail = new THREE.Line(lineGeo, lineMat);
        scene.add(trail);

        // UI Initialization
        initNetworkNodes();
        initAmmoConfig();
        startClock();
        
        // Event Listeners
        window.addEventListener('resize', onWindowResize, false);
        
        // Start Loop
        animate();
        logToConsole('sys', 'SISTEMA INICIALIZADO. ESPERANDO ÓRDENES.');
        logToConsole('net', `${STATE.nodes.filter(n => n.status === 'online').length} nodos tácticos conectados.`);
    }

    function initNetworkNodes() {
        const container = document.getElementById('network-nodes');
        container.innerHTML = STATE.nodes.map(node => `
            <div class="node-status">
                <div class="status-dot status-${node.status}"></div>
                <div class="flex-1">
                    <div class="font-bold">${node.name}</div>
                    <div class="opacity-50 text-[9px]">${node.type} | ID: ${node.id}</div>
                </div>
                ${node.status === 'online' ? '<span class="text-[9px] text-green-500">SYNC</span>' : ''}
            </div>
        `).join('');
    }

    function initAmmoConfig() {
        const cal = document.getElementById('calibre-select').value;
        const ammoSel = document.getElementById('ammo-select');
        ammoSel.innerHTML = WEAPONS_DATA[cal].ammo.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        initChargeConfig();
    }

    function initChargeConfig() {
        const cal = document.getElementById('calibre-select').value;
        const chargeSel = document.getElementById('charge-select');
        chargeSel.innerHTML = WEAPONS_DATA[cal].charges.map(c => `<option value="${c.v0}">${c.name}</option>`).join('');
        updateBallistics();
    }

    function updateBallistics() {
        STATE.currentV0 = parseFloat(document.getElementById('charge-select').value);
        document.getElementById('v0-display').innerText = STATE.currentV0 + " m/s";
    }

    // --- PHYSICS ENGINE ---
    function fireProjectile() {
        if (STATE.isFlying) return;

        const angle = parseFloat(document.getElementById('angle-num').value);
        const rad = THREE.MathUtils.degToRad(angle);
        const cal = document.getElementById('calibre-select').value;
        const ammoId = document.getElementById('ammo-select').value;

        STATE.activeAmmo = WEAPONS_DATA[cal].ammo.find(a => a.id === ammoId);
        
        // Reset State Vector [x, y, z, vx, vy, vz, pitch, yaw, roll, ...]
        stateVec.fill(0);
        stateVec[4] = STATE.currentV0 * Math.sin(rad); // Vy
        stateVec[5] = STATE.currentV0 * Math.cos(rad); // Vz (Forward)
        stateVec[6] = -rad; // Pitch
        
        STATE.isFlying = true;
        STATE.maxAltitude = 0;
        projectile.visible = true;
        pathPoints = [new THREE.Vector3(0, 0, 0)];
        document.getElementById('table-body').innerHTML = "";
        document.getElementById('ai-console').classList.add('hidden');
        
        logToConsole('fire', `DISPARO CONFIRMADO. AZIMUT: 0°, ELEV: ${angle}°, V0: ${STATE.currentV0}m/s`);
        
        // Simular envío a nodos Android
        simulateNetworkSend('FIRE_MISSION', { target: 'SIMULATED', coords: 'NK456789' });
    }

    function solvePhysics(dt) {
        const g = 9.80665;
        const speed = Math.sqrt(stateVec[3]**2 + stateVec[4]**2 + stateVec[5]**2);
        
        if (speed < 1 && stateVec[1] < 0) return; // Stop if landed

        // Atmospheric Drag
        const rho = 1.225 * Math.exp(-stateVec[1] / 8500);
        const area = Math.PI * (0.077 ** 2);
        const dragCoeff = 0.22;
        const dragForce = 0.5 * rho * speed * speed * dragCoeff * area;
        const accDrag = dragForce / STATE.activeAmmo.mass;

        // Apply Drag
        stateVec[3] -= (stateVec[3] / speed) * accDrag * dt;
        stateVec[4] -= ((stateVec[4] / speed) * accDrag + g) * dt;
        stateVec[5] -= (stateVec[5] / speed) * accDrag * dt;

        // Wind Influence
        stateVec[3] += STATE.windVector.x * 0.01 * dt;
        stateVec[5] += STATE.windVector.z * 0.01 * dt;

        // HERA Rocket Assist
        if (STATE.activeAmmo.hera && clock.getElapsedTime() < 12) {
            const thrust = 1300 / STATE.activeAmmo.mass;
            stateVec[4] += (stateVec[4] / speed) * thrust * dt;
            stateVec[5] += (stateVec[5] / speed) * thrust * dt;
        }

        // Integrate Position
        stateVec[0] += stateVec[3] * dt;
        stateVec[1] += stateVec[4] * dt;
        stateVec[2] += stateVec[5] * dt;
        
        if (stateVec[1] > STATE.maxAltitude) STATE.maxAltitude = stateVec[1];

        // Update Rotation
        stateVec[6] = -Math.atan2(stateVec[4], stateVec[5]);
        stateVec[8] += 10 * dt; // Spin
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);

        if (STATE.isFlying) {
            // Sub-steps for stability
            for (let i = 0; i < 5; i++) solvePhysics(dt / 5);

            projectile.position.set(stateVec[0], stateVec[1], stateVec[2]);
            projectile.rotation.set(stateVec[6], 0, stateVec[8]);
            
            pathPoints.push(projectile.position.clone());
            if (pathPoints.length % 3 === 0) {
                trail.geometry.setFromPoints(pathPoints);
                updateTelemetry();
                addTableEntry(clock.getElapsedTime(), stateVec[2], stateVec[1], Math.sqrt(stateVec[3]**2 + stateVec[4]**2 + stateVec[5]**2));
            }

            // Camera Logic
            if (STATE.cameraMode === 'follow') {
                const targetPos = new THREE.Vector3(stateVec[0] + 20, stateVec[1] + 10, stateVec[2] - 30);
                camera.position.lerp(targetPos, 0.1);
                controls.target.copy(projectile.position);
            } else if (STATE.cameraMode === 'god') {
                camera.position.set(stateVec[0], stateVec[1] + 2000, stateVec[2]);
                controls.target.copy(projectile.position);
            }

            // Impact Detection
            if (stateVec[1] < 0 && stateVec[4] < 0) {
                STATE.isFlying = false;
                logToConsole('success', `IMPACTO CONFIRMADO EN X: ${stateVec[2].toFixed(0)}m`);
                simulateNetworkSend('IMPACT_REPORT', { distance: stateVec[2], altitude: STATE.maxAltitude });
            }
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // --- UI UPDATES ---
    function updateTelemetry() {
        document.getElementById('val-x').innerText = stateVec[2].toFixed(0) + " m";
        document.getElementById('val-y').innerText = stateVec[1].toFixed(0) + " m";
        document.getElementById('val-v').innerText = Math.sqrt(stateVec[3]**2 + stateVec[4]**2 + stateVec[5]**2).toFixed(1) + " m/s";
        document.getElementById('val-att').innerText = `${(stateVec[6] * 57.3).toFixed(1)}°`;
    }

    function addTableEntry(t, x, y, v) {
        if (Math.floor(t * 10) % 5 !== 0) return; // Throttle DOM updates
        const tbody = document.getElementById('table-body');
        const row = `<tr><td>${t.toFixed(2)}</td><td>${x.toFixed(0)}</td><td>${y.toFixed(0)}</td><td>${v.toFixed(0)}</td></tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
        tbody.parentElement.scrollTop = tbody.parentElement.scrollHeight;
    }

    function setCameraMode(mode) {
        STATE.cameraMode = mode;
        if (mode === 'fixed') {
            camera.position.set(50, 30, 50);
            controls.target.set(0, 0, 0);
        }
    }

    function togglePanel(id) {
        document.getElementById(id).classList.toggle('panel-collapsed');
    }

    function syncSlider(v) {
        document.getElementById('angle-input').value = v;
        updateCannonRotation(v);
    }

    function syncNum(v) {
        document.getElementById('angle-num').value = v;
        updateCannonRotation(v);
    }

    function updateCannonRotation(angle) {
        cannon.rotation.x = -THREE.MathUtils.degToRad(angle);
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toISOString().split('T')[1].split('.')[0] + ' Z';
        }, 1000);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- AI & NETWORK SIMULATION ---
    async function callGemini(prompt, systemPrompt) {
        if (!API_KEY) {
            return "Simulación: " + prompt; // Fallback si no hay API Key
        }
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Error en respuesta IA.";
        } catch (e) {
            return "Error de conexión con IA.";
        }
    }

    async function askGeminiStrategy() {
        const input = document.getElementById('ai-input').value;
        if (!input) return;
        const consoleEl = document.getElementById('ai-console');
        consoleEl.classList.remove('hidden');
        consoleEl.innerHTML = "<span class='loading-dots'>Calculando solución de tiro con IA</span>";
        
        const response = await callGemini(
            `Objetivo: ${input}. Calcula carga y elevación aproximada para obús 155mm.`,
            "Eres un experto en balística de artillería. Responde solo con datos técnicos breves."
        );
        consoleEl.innerText = response;
        logToConsole('ai', 'Solución estratégica generada.');
    }

    async function analyzeWeather() {
        const consoleEl = document.getElementById('ai-console');
        consoleEl.classList.remove('hidden');
        consoleEl.innerHTML = "<span class='loading-dots'>Analizando telemetría atmosférica</span>";
        
        // Simulate random weather
        STATE.windVector.x = (Math.random() - 0.5) * 20;
        STATE.windVector.z = (Math.random() - 0.5) * 20;
        
        document.getElementById('weather-display').classList.remove('hidden');
        document.getElementById('weather-text').innerText = `VIENTO: ${STATE.windVector.x.toFixed(1)}m/s LAT, ${STATE.windVector.z.toFixed(1)}m/s LONG`;
        logToConsole('sys', 'Datos meteorológicos actualizados.');
    }

    async function optimizeTrajectory() {
        const consoleEl = document.getElementById('ai-console');
        consoleEl.classList.remove('hidden');
        consoleEl.innerHTML = "<span class='loading-dots'>Optimizando parámetros balísticos</span>";
        await new Promise(r => setTimeout(r, 1500));
        consoleEl.innerText = "Optimización completada: Se recomienda aumentar elevación a 48° para compensar viento cruzado.";
        document.getElementById('angle-num').value = 48;
        syncSlider(48);
    }

    function simulateNetworkSend(type, payload) {
        console.log(`[NETWORK] Sending ${type} to ${STATE.nodes.length} nodes...`);
        // Aquí iría la lógica real de WebSocket para enviar al backend Kotlin
        logToConsole('net', `Enviando paquete ${type} a nodos Android...`);
    }

    function logToConsole(type, msg) {
        const consoleEl = document.getElementById('ai-console');
        consoleEl.classList.remove('hidden');
        const time = new Date().toISOString().split('T')[1].split('.')[0];
        const className = `log-${type === 'fire' ? 'error' : type === 'success' ? 'success' : 'info'}`;
        const entry = `<div class="log-entry ${className}"><span class="opacity-50">[${time}]</span> ${msg}</div>`;
        consoleEl.insertAdjacentHTML('beforeend', entry);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // Boot
    init();
</script>
</body>
</html>
